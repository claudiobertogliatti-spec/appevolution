    <!-- ════════════════ HOST DETECTION FALLBACK (dev/preview) ════════════════
         In produzione, Vercel serve build/index.ciak.html (con meta Ciak
         server-side) quando host = ciak.io / www.ciak.io — vedi vercel.json
         rewrites. I crawler social (FB, LinkedIn, WhatsApp, Twitter) leggono
         quei meta direttamente, senza JS.

         Questo script è SOLO un fallback per: localhost?ciak=1, preview
         vercel.app, custom domain non mappato. Non influisce sui crawler.
    ════════════════════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        var host = location.hostname.toLowerCase();
        var force = new URLSearchParams(location.search).get("ciak") === "1";
        var isCiak = host === "ciak.io" || host === "www.ciak.io" || host.endsWith(".ciak.io") || force;
        if (!isCiak) return;
        document.title = "Ciak — Masterclass gratuita per consulenti e coach";
        var meta = document.querySelector("meta[name='description']");
        if (meta) meta.content = "Masterclass gratuita on-demand 30 minuti per consulenti e coach: i 5 errori più comuni che fanno perdere clienti — e come risolverli. Guardala quando vuoi su ciak.io.";
        var theme = document.querySelector("meta[name='theme-color']");
        if (theme) theme.content = "#0F172A";
        var link = document.querySelector("link[rel='icon']") || document.createElement("link");
        link.rel = "icon";
        link.type = "image/webp";
        link.href = "/ciak/icon.webp";
        document.head.appendChild(link);
      })();
    </script>
