<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvolutionPro - Sidebar Preview</title>
  <style>
    :root {
      --bg: #0f131b;
      --panel: #171c27;
      --item-hover: #252d3b;
      --item-active: #303948;
      --text: #e8ecf3;
      --text-muted: #a9b2c1;
      --brand: #f2c418;
      --border: #222938;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .layout {
      width: min(1100px, 100%);
      height: min(760px, 92vh);
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 20px 50px rgba(0,0,0,.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      background: linear-gradient(180deg, #161b25 0%, #0f131b 100%);
      color: var(--text);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 18px;
      border-bottom: 1px solid var(--border);
    }

    .logo-badge {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: var(--brand);
      color: #111;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .logo small { color: var(--text-muted); display: block; font-size: 11px; }
    .logo strong { font-size: 15px; }

    nav { padding: 14px 12px; display: grid; gap: 8px; }

    .item {
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      width: 100%;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
      text-align: left;
    }

    .item svg { width: 20px; height: 20px; color: #c7cfda; transition: .18s ease; }

    .item:hover {
      background: var(--item-hover);
      border-color: #3a4457;
      transform: translateY(-1px);
    }
    .item:hover svg { color: var(--brand); }

    .item.active {
      background: var(--item-active);
      border-color: #485266;
      box-shadow: inset 3px 0 0 var(--brand);
      color: var(--brand);
    }
    .item.active svg { color: var(--brand); }

    .footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 14px 12px;
    }

    .user {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0 0 10px 6px;
    }

    .main {
      padding: 28px;
      background: #f8fafc;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
    }

    h1 { margin: 0 0 8px; font-size: 42px; }
    p { margin: 0; color: #64748b; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-badge">E</div>
        <div>
          <strong>EvolutionPro</strong>
          <small>Area Partner</small>
        </div>
      </div>

      <nav>
        <button class="item active"><i data-lucide="layout-dashboard"></i>Overview</button>
        <button class="item"><i data-lucide="users"></i>Partner</button>
        <button class="item"><i data-lucide="user-round"></i>Clienti</button>
        <button class="item"><i data-lucide="bar-chart-3"></i>Analisi</button>
        <button class="item"><i data-lucide="file-text"></i>Documenti</button>
      </nav>

      <div class="footer">
        <div class="user">Claudio</div>
        <button class="item"><i data-lucide="log-out"></i>Esci</button>
      </div>
    </aside>

    <main class="main">
      <div class="card">
        <h1>Dashboard Overview</h1>
        <p>Preview statico: pulsanti più grandi, angoli arrotondati, sfondo scuro e icone lineari stile attuale.</p>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
