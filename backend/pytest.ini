[pytest]
asyncio_mode = auto
testpaths = tests
# Aggiunge backend/ a sys.path: i test importano 'services'/'routers' come moduli top-level.
pythonpath = .
markers =
    unit: test ermetici, senza backend live (girano in CI).
    integration: richiedono REACT_APP_BACKEND_URL e un backend in esecuzione.
