name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (syntax + lint + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # 1) Check di sintassi su TUTTO il backend (BLOCCANTE).
      #    Intercetta errori tipo "await outside async function" (problema #11 in CLAUDE.md).
      - name: Syntax check (compileall)
        run: python -m compileall -q backend

      # 2) Lint errori di sintassi/parse (BLOCCANTE, zero falsi positivi).
      - name: Lint sintassi (flake8 E9)
        run: |
          python -m pip install --quiet flake8
          flake8 backend --count --select=E9 --show-source --statistics \
            --exclude='backend/__pycache__,backend/tests/__pycache__'

      # 3) Nomi non definiti / import mancanti (INFORMATIVO, non blocca).
      - name: Lint nomi non definiti (flake8 F — informativo)
        continue-on-error: true
        run: flake8 backend --count --select=F63,F7,F82 --show-source --statistics
          --exclude='backend/__pycache__,backend/tests/__pycache__'

      # 4) Dipendenze + unit test ermetici (BLOCCANTE).
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      # MONGO_URL fittizia: serve solo perche' routers/dependencies.py la richiede
      # all'import (il client Motor e' lazy, nessuna connessione reale).
      # Lista esplicita dei file unit: evita di importare gli integration test
      # che fanno raise all'import senza un backend live.
      - name: Unit tests
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ciak_ci
          JWT_SECRET_KEY: ci-test-secret
        run: >
          pytest -q
          tests/test_ciak_analisi.py
          tests/test_ciak_analisi_prompt_store.py
          tests/test_ciak_analisi_public.py
          tests/test_checkout_trigger.py
          tests/test_ciak_pdf.py
          tests/test_servizi_extra_catalogo.py

  frontend:
    name: Frontend (build smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Allineato a vercel.json (installCommand): il repo ha un conflitto di
      # peer-deps (react-day-picker vuole date-fns 2/3, qui c'e' date-fns 4),
      # risolto come in produzione con --legacy-peer-deps.
      - name: Install
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # Allineato a vercel.json (buildCommand). DISABLE_ESLINT_PLUGIN evita i
      # conflitti eslint v9; CI=false: i warning non bloccano. Errori reali
      # (sintassi, import mancanti, JSX rotto) fanno comunque fallire.
      - name: Build (smoke test)
        working-directory: frontend
        run: DISABLE_ESLINT_PLUGIN=true CI=false npm run build
