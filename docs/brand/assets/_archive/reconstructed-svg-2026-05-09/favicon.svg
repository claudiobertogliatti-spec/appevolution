<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32" role="img" aria-label="Ciak favicon">
  <!-- Versione semplificata per render piccoli (16x16, 32x32) -->
  <!-- Niente pixel decorativi, segmenti più spessi -->

  <g fill="none" stroke-width="14" stroke-linecap="round">
    <!-- Top-right (giallo accento) -->
    <path stroke="#FACC15" d="M 67.5 19.69 A 35 35 0 0 1 50 15"/>
    <!-- Lato superiore (grigio) -->
    <path stroke="#64748B" d="M 50 15 A 35 35 0 0 1 19.69 32.5"/>
    <!-- Lato sinistro/centro (grigio) -->
    <path stroke="#64748B" d="M 19.69 32.5 A 35 35 0 0 1 15 50"/>
    <!-- Lato inferiore (blu profondo) -->
    <path stroke="#0F172A" d="M 15 50 A 35 35 0 0 1 43.92 84.47"/>
    <path stroke="#0F172A" d="M 43.92 84.47 A 35 35 0 0 1 67.5 80.31"/>
  </g>
</svg>
