<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130" role="img" aria-label="Ciak Si Cambia logo orizzontale">
  <title>Ciak Si Cambia — logo orizzontale</title>

  <!-- ICONA "C" -->
  <g transform="translate(0,15)">
    <g fill="none" stroke-width="9" stroke-linecap="round">
      <path stroke="#FACC15" d="M 67.5 19.69 A 35 35 0 0 1 50 15"/>
      <path stroke="#64748B" d="M 50 15 A 35 35 0 0 1 32.5 19.69"/>
      <path stroke="#64748B" d="M 32.5 19.69 A 35 35 0 0 1 19.69 32.5"/>
      <path stroke="#64748B" d="M 19.69 32.5 A 35 35 0 0 1 15 50"/>
      <path stroke="#0F172A" d="M 15 50 A 35 35 0 0 1 23.19 72.5"/>
      <path stroke="#0F172A" d="M 23.19 72.5 A 35 35 0 0 1 43.92 84.47"/>
      <path stroke="#0F172A" d="M 43.92 84.47 A 35 35 0 0 1 67.5 80.31"/>
    </g>
    <rect x="14" y="13" width="3" height="3" fill="#0F172A"/>
    <rect x="20" y="8" width="4" height="4" fill="#64748B"/>
    <rect x="9" y="20" width="3" height="3" fill="#64748B"/>
    <rect x="26" y="14" width="3" height="3" fill="#0F172A"/>
    <rect x="6" y="11" width="2.5" height="2.5" fill="#64748B"/>
  </g>

  <!-- TESTO "iak" -->
  <text x="105" y="78" font-family="Poppins, system-ui, sans-serif" font-weight="600" font-size="62" fill="#0F172A" letter-spacing="-1">iak</text>

  <!-- "SI CAMBIA" con linee laterali gialle -->
  <line x1="135" y1="105" x2="148" y2="105" stroke="#FACC15" stroke-width="2"/>
  <text x="155" y="109" font-family="Poppins, system-ui, sans-serif" font-weight="500" font-size="13" letter-spacing="3" fill="#0F172A">SI CAMBIA</text>
  <line x1="247" y1="105" x2="260" y2="105" stroke="#FACC15" stroke-width="2"/>
</svg>
