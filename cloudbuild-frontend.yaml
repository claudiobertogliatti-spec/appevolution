steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/gen-lang-client-0744698012/evolution-pro-frontend:$BUILD_ID',
        './frontend',
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'gcr.io/gen-lang-client-0744698012/evolution-pro-frontend:$BUILD_ID',
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'evolution-pro-frontend',
        '--image',
        'gcr.io/gen-lang-client-0744698012/evolution-pro-frontend:$BUILD_ID',
        '--region',
        'europe-west1',
        '--platform',
        'managed',
        '--allow-unauthenticated',
        '--revision-suffix',
        'b$BUILD_ID',
      ]

images:
  - 'gcr.io/gen-lang-client-0744698012/evolution-pro-frontend:$BUILD_ID'