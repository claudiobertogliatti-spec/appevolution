steps:
  # Build frontend image senza cache
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/evolution-pro-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/evolution-pro-frontend:latest'
      - '.'
    dir: 'frontend'

  # Push immagine
  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/evolution-pro-frontend']

  # Deploy su Cloud Run con SHA esatto (non :latest)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    args:
      - 'run'
      - 'deploy'
      - 'evolution-pro-frontend'
      - '--image=gcr.io/$PROJECT_ID/evolution-pro-frontend:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/evolution-pro-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/evolution-pro-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
